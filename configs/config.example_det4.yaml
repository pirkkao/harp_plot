#
# DETERMINISTIC FC PLOTTING EXAMPLE 4:
# using grib and data from met.no thredds archive
#
# Load in a grib file and request operational MEPS and Arome-Arctic
# forecasts from met.no thredds-archive.
#
# More detailed comments:
#
# Fetching grib files seems to be ok even without the
# "as_harp_parameter()"-function for the harp read_forecast()-
# function.
#
# Here regridding is essential if you want to make easy to see
# comparisons between MEPS and/or Arome-Arctic. Try plotting
# these without the regrid option. Note, for and difference maps
# you need to run regrid.
#
data:
  1:
    tmpl: local_grb_ml
    exp:  ["cy46_windenergy_19spp"]
    ensm: [0]
    flds: ["2t"]
  2:
    tmpl: meps_oper
    exp: ["meps"]
    ensm: [0]
    flds: ["air_temperature_2m"]
    decum:
  3:
    tmpl: arome_arctic
    exp: ["arctic"]
    ensm: [0]
    flds: ["air_temperature_2m"]
    decum:
    
times:
  sdate: 2025090912
  lead_times: 24

grid:
  subgrid:
  regrid: true

opts:
  fig_name: "fig/example_det4.png"
  fig_size: [12,4,300] # [width,heigh,dpi]
  collect_guides: false

# plot:
#   row1:
#     column1:
#       ...
#     column2:
#       ...
#   row2:
#     column1:
#       ...
#     column2:
#       ...
plot:
  1:
    1:
      type: "fc"
      data1: 1
      ensm: [0]
      name: 
      col_map: 1
    2:
      type: "fc"
      data1: 2
      ensm: [0]
      name: 
      col_map: 1
    3:
      type: "fc"
      data1: 3
      ensm: [0]
      name: 
      col_map: 1

col_maps:
  1:
    name: 'scale_fill_stepsn(colours=scico(54,palette="lipari",direction=1,begin=0.2),limits=c(0,35),breaks=c(0,5,10,15,20,25,30,35))'
    legend: "*C"

